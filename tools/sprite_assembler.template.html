<!--
  Zombie Farm — Manual Sprite Assembler
  =====================================
  A hands-on rig editor for BOTH sprite systems:
    • Enemies (raids/enemies/models.json) — each model slices its OWN strip PNG
      via rx/ry/rw/rh; parts carry px/py/ax/ay/z/rot/group/back; model carries
      neck + optional shoulder pivot and punch/slam/chopSign flags.
    • Zombies (zombie/models.json) — shared ZombieSheet atlas + frames.json; parts
      carry file/group/px/py/ax/ay/z/tint; model carries neck/scale/color.

  Drag parts to move, drag the ◆ anchor to relocate a pivot (texture stays put),
  drag the green handle to rotate, reorder/show-hide/add-remove layers, drag the
  named pivots, then Copy the exact models.json schema back out. Ctrl+Z undoes.

  GENERATED by tools/build_sprite_assembler.py, which inlines the current atlases
  + models so the tool works by double-clicking. Re-run it after art/rig changes,
  or hot-load fresher files via the Load buttons.
-->
<meta charset="utf-8" />
<title>ZF Sprite Assembler</title>
<style>
  :root {
    --bg: #14171c; --panel: #1c2128; --panel2: #232a33; --line: #313a45;
    --ink: #e6edf3; --muted: #8b98a5; --accent: #58a6ff; --accent2: #3fb950;
    --danger: #f85149; --warn: #d29922; --cyan: #39c5cf;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font: 13px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { display: grid; grid-template-columns: 262px 1fr 306px; height: 100vh; }
  .col { min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
  .col.left { border-right: 1px solid var(--line); }
  .col.right { border-left: 1px solid var(--line); }
  .col.center { position: relative; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0; padding: 10px 12px 6px; }
  .pad { padding: 8px 12px; }
  .scroll { overflow-y: auto; flex: 1; }
  label { color: var(--muted); font-size: 11px; }
  select, input, button, textarea {
    font: inherit; color: var(--ink); background: var(--panel2);
    border: 1px solid var(--line); border-radius: 5px; padding: 5px 7px; }
  select, input[type=text], input[type=number] { width: 100%; }
  input[type=number] { -moz-appearance: textfield; }
  button { cursor: pointer; background: var(--panel2); }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: default; }
  button.primary { background: #1f6feb33; border-color: var(--accent); }
  button.danger:hover { border-color: var(--danger); color: var(--danger); }
  .row { display: flex; gap: 6px; align-items: center; }
  .row + .row { margin-top: 6px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
  .field { display: flex; flex-direction: column; gap: 2px; }
  canvas { display: block; }
  #stage { width: 100%; height: 100%; cursor: default; touch-action: none; }
  .layer { display: flex; align-items: center; gap: 6px; padding: 4px 8px;
    border-bottom: 1px solid var(--line); cursor: pointer; user-select: none; }
  .layer:hover { background: var(--panel2); }
  .layer.sel { background: #1f6feb26; box-shadow: inset 2px 0 0 var(--accent); }
  .layer .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer .z { color: var(--muted); font-size: 10px; min-width: 30px; text-align: right; }
  .layer .grp { font-size: 9px; color: var(--muted); background: var(--panel);
    padding: 1px 4px; border-radius: 3px; }
  .layer .vis { opacity: .45; }
  .layer .vis.on { opacity: 1; }
  .hint { color: var(--muted); font-size: 11px; }
  .hint kbd { background: var(--panel2); border: 1px solid var(--line); border-radius: 3px;
    padding: 0 4px; font-family: ui-monospace, monospace; font-size: 10px; }
  textarea { width: 100%; height: 100%; resize: none; font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 11px; white-space: pre; }
  #export { flex: 1; min-height: 110px; }
  .toolbar { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--line);
    align-items: center; flex-wrap: wrap; }
  .sep { width: 1px; align-self: stretch; background: var(--line); margin: 0 2px; }
  .overlay-tip { position: absolute; left: 12px; bottom: 12px; background: #000a; padding: 6px 10px;
    border-radius: 6px; color: var(--muted); font-size: 11px; pointer-events: none; max-width: 66%; }
  .badge { position: absolute; right: 12px; top: 12px; background: #000a; padding: 6px 10px;
    border-radius: 6px; font-size: 11px; pointer-events: none; }
  .mini { padding: 3px 6px; font-size: 11px; }
  .toggle { display: inline-flex; align-items: center; gap: 4px; }
  .pivotrow { display: flex; gap: 4px; align-items: center; padding: 3px 8px; border-bottom: 1px solid var(--line); }
  .pivotrow input[type=number] { padding: 2px 5px; width: 56px; }
  .flags { display: flex; gap: 12px; flex-wrap: wrap; padding: 6px 12px; }
</style>

<div id="app">
  <!-- LEFT -->
  <div class="col left">
    <div class="toolbar" style="justify-content:space-between">
      <strong style="font-size:12px">🧟 Sprite Assembler</strong>
    </div>
    <div class="pad">
      <div class="field">
        <label>Dataset</label>
        <select id="dsSel"></select>
      </div>
      <div class="field" style="margin-top:6px">
        <label>Model</label>
        <select id="modelSel"></select>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="mini" id="btnReset" title="Revert this model to the loaded original">Revert model</button>
        <button class="mini" id="btnDupe" title="Duplicate as a new model key">Duplicate…</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="mini primary" id="btnStore" title="Save every edit in this dataset to your browser (auto-restores next time you open the tool)">💾 Store</button>
        <button class="mini" id="btnDownload" title="Download the edited models.json to disk">⬇ Download</button>
        <button class="mini danger" id="btnDiscard" title="Delete stored edits and reload the shipped originals">🗑</button>
      </div>
      <div class="hint" id="storeStatus" style="min-height:14px;margin-top:4px"></div>
    </div>
    <h2>Layers <span class="hint">(top = front)</span></h2>
    <div class="scroll" id="layerList"></div>
    <div class="pad" style="border-top:1px solid var(--line)">
      <label id="addLabel">Add part</label>
      <div class="row" style="margin-top:2px">
        <input type="text" id="addPartInput" list="frameList" placeholder="frame name…" />
        <button class="mini primary" id="btnAddPart">+</button>
      </div>
      <datalist id="frameList"></datalist>
    </div>
  </div>

  <!-- CENTER -->
  <div class="col center">
    <div class="toolbar">
      <button class="mini" id="btnUndo" title="Undo (Ctrl+Z)">↶ Undo</button>
      <button class="mini" id="btnRedo" title="Redo (Ctrl+Y / Ctrl+Shift+Z)">↷ Redo</button>
      <span class="sep"></span>
      <button class="mini" id="btnFit" title="Fit view to the rig">Fit</button>
      <label class="toggle"><input type="checkbox" id="ckGrid" checked /> Grid</label>
      <label class="toggle"><input type="checkbox" id="ckOnion" /> Onion</label>
      <label class="toggle"><input type="checkbox" id="ckHitAlpha" checked /> Pixel-pick</label>
      <span class="sep"></span>
      <label class="toggle">Zoom <input type="range" id="zoomRange" min="1" max="12" step="0.5" value="4" style="width:84px"></label>
      <span class="sep"></span>
      <button class="mini" id="btnLoadImg">Load image…</button>
      <button class="mini" id="btnLoadFrames">Load frames…</button>
      <button class="mini" id="btnLoadModels">Load models…</button>
      <input type="file" id="filePng" accept="image/png" hidden>
      <input type="file" id="fileFrames" accept=".json,application/json" hidden>
      <input type="file" id="fileModels" accept=".json,application/json" hidden>
    </div>
    <canvas id="stage"></canvas>
    <div class="badge" id="badge"></div>
    <div class="overlay-tip">
      Drag part = move · Drag <b style="color:var(--warn)">◆</b> anchor = relocate pivot ·
      Drag <b style="color:var(--accent2)">●</b> = rotate · Scroll = zoom · Space+drag = pan ·
      Arrows nudge · <kbd>[</kbd>/<kbd>]</kbd> layer · <kbd>Del</kbd> remove · <kbd>Ctrl+Z</kbd> undo
    </div>
  </div>

  <!-- RIGHT -->
  <div class="col right">
    <h2>Selected part</h2>
    <div class="pad" id="inspector"><div class="hint">No part selected.</div></div>
    <h2>Model pivots & flags</h2>
    <div id="pivotEditor"></div>
    <div class="flags" id="flagEditor"></div>
    <h2 style="display:flex;justify-content:space-between;align-items:center">
      Export <button class="mini primary" id="btnCopy" style="margin-right:10px">Copy model</button>
    </h2>
    <div class="pad" style="padding-top:0">
      <div class="row" style="margin-bottom:6px">
        <button class="mini" id="btnCopyAll" title="Copy the entire edited models.json">Copy ALL</button>
        <button class="mini" id="btnPaste" title="Paste a model JSON to replace the current model">Paste model</button>
      </div>
    </div>
    <textarea id="export" spellcheck="false" readonly></textarea>
  </div>
</div>

<script>
window.__BOOT__ = window.__BOOT__ || __BOOT_JSON__;

(function () {
  "use strict";
  const $ = (s) => document.querySelector(s);
  const canvas = $("#stage");
  const ctx = canvas.getContext("2d");
  const clone = (o) => JSON.parse(JSON.stringify(o));

  // ---- Global data ----
  let DATASETS = {};   // name -> {kind, models, frames?, atlas?, strips?}
  let dsName = "";
  let kind = "enemy";  // 'enemy' | 'zombie'
  let frames = {};     // zombie only
  let models = {};     // active dataset models (live)
  let originalModels = {};
  let modelKey = null, model = null;
  let sel = -1;
  const hidden = new Set();

  // texture sources
  let atlasCanvas = null, atlasCtx = null;           // zombie shared atlas
  const stripImg = {}, stripCanvas = {}, stripCtx = {}; // enemy per-model strips

  // view
  const view = { ox: 0, oy: 0, zoom: 4 };
  const w2s = (x, y) => [view.ox + x * view.zoom, view.oy + y * view.zoom];
  const s2w = (sx, sy) => [(sx - view.ox) / view.zoom, (sy - view.oy) / view.zoom];

  // ---- Texture accessors (format-agnostic) ----
  const srcCanvas = () => (kind === "enemy" ? stripCanvas[modelKey] : atlasCanvas);
  const srcCtx = () => (kind === "enemy" ? stripCtx[modelKey] : atlasCtx);
  function partRect(p) {
    if (kind === "enemy") return { x: p.rx, y: p.ry, w: p.rw, h: p.rh };
    const f = frames[p.file]; return f ? { x: f.x, y: f.y, w: f.w, h: f.h } : null;
  }
  const partLabel = (p) => (kind === "enemy" ? `${p.group || "body"}` : p.file);

  // ---------------------------------------------------------------------------
  // Undo / redo
  // ---------------------------------------------------------------------------
  let undoStack = [], redoStack = [], lastTag = null, lastTime = 0;
  function pushUndo(tag) {
    const now = Date.now();
    if (tag && tag === lastTag && now - lastTime < 550) { lastTime = now; return; }
    undoStack.push({ ds: dsName, key: modelKey, data: clone(models[modelKey]) });
    if (undoStack.length > 200) undoStack.shift();
    redoStack.length = 0;
    lastTag = tag || null; lastTime = now;
    refreshUndoButtons();
  }
  function applyState(s, into) {
    if (s.ds !== dsName) activateDataset(s.ds, false);
    into.push({ ds: dsName, key: modelKey, data: clone(models[s.key]) });
    models[s.key] = s.data;
    modelKey = s.key; model = models[modelKey];
    $("#dsSel").value = dsName; rebuildModelSelect(true);
  }
  function undo() {
    const s = undoStack.pop(); if (!s) return;
    lastTag = null;
    applyState(s, redoStack);
    refreshUndoButtons();
  }
  function redo() {
    const s = redoStack.pop(); if (!s) return;
    lastTag = null;
    // push current onto undo (without clearing redo)
    undoStack.push({ ds: dsName, key: modelKey, data: clone(models[modelKey]) });
    if (s.ds !== dsName) activateDataset(s.ds, false);
    models[s.key] = s.data; modelKey = s.key; model = models[modelKey];
    $("#dsSel").value = dsName; rebuildModelSelect(true);
    refreshUndoButtons();
  }
  function refreshUndoButtons() {
    $("#btnUndo").disabled = !undoStack.length;
    $("#btnRedo").disabled = !redoStack.length;
    $("#btnUndo").textContent = "↶ Undo" + (undoStack.length ? ` (${undoStack.length})` : "");
  }

  // ---------------------------------------------------------------------------
  // Persistence (localStorage) — "Store" saves every edit in the dataset so it
  // survives closing the tool; once stored it keeps itself saved as you work.
  // ---------------------------------------------------------------------------
  const storeKey = (name) => "zfsa:models:" + name;
  function allSerialized() { const all = {}; Object.keys(models).forEach((k) => all[k] = serializeModel(models[k])); return all; }
  function loadStored(name) { try { const raw = localStorage.getItem(storeKey(name)); return raw ? JSON.parse(raw) : null; } catch (_) { return null; } }
  function storeDataset(quiet) {
    try {
      localStorage.setItem(storeKey(dsName), JSON.stringify(allSerialized()));
      DATASETS[dsName].autosave = true;
      if (!quiet) setStoreStatus(`💾 Stored ${Object.keys(models).length} models — will auto-restore`, "#3fb950");
    } catch (err) { setStoreStatus("⚠ Could not store: " + err.message, "#f85149"); }
  }
  let autosaveTimer = null;
  function autosaveMaybe() {
    if (!DATASETS[dsName] || !DATASETS[dsName].autosave) return;
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => { storeDataset(true); setStoreStatus("💾 Saved", "#8b98a5"); }, 700);
  }
  function discardStored() {
    if (!confirm(`Delete stored edits for "${dsName}" and reload the shipped originals? (Download first if you want to keep them.)`)) return;
    try { localStorage.removeItem(storeKey(dsName)); } catch (_) {}
    DATASETS[dsName].autosave = false;
    models = clone(DATASETS[dsName].original);
    DATASETS[dsName].models = models;
    undoStack = []; redoStack = []; refreshUndoButtons();
    modelKey = Object.keys(models)[0];
    rebuildModelSelect(false);
    setStoreStatus("↩ Reloaded shipped originals", "#8b98a5");
  }
  function downloadDataset() {
    const blob = new Blob([JSON.stringify(allSerialized(), null, 1)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = dsName + "-models.json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    setStoreStatus(`⬇ Downloaded ${a.download}`, "#58a6ff");
  }
  function setStoreStatus(msg, color) { const el = $("#storeStatus"); el.textContent = msg || ""; el.style.color = color || "var(--muted)"; }

  // ---------------------------------------------------------------------------
  // Canvas sizing / view
  // ---------------------------------------------------------------------------
  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(r.width * dpr));
    canvas.height = Math.max(1, Math.floor((r.height - 49) * dpr));
    canvas.style.width = r.width + "px";
    canvas.style.height = (r.height - 49) + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }
  window.addEventListener("resize", resize);
  function cssSize() { const dpr = window.devicePixelRatio || 1; return [canvas.width / dpr, canvas.height / dpr]; }

  function partCorners(p) {
    const r = partRect(p); if (!r) return [];
    const rot = p.rot || 0, c = Math.cos(rot), s = Math.sin(rot);
    return [[-p.ax * r.w, -p.ay * r.h], [(1 - p.ax) * r.w, -p.ay * r.h],
            [(1 - p.ax) * r.w, (1 - p.ay) * r.h], [-p.ax * r.w, (1 - p.ay) * r.h]]
      .map(([lx, ly]) => [p.px + lx * c - ly * s, p.py + lx * s + ly * c]);
  }
  function fitView() {
    const [cw, ch] = cssSize();
    let minX = 0, minY = 0, maxX = 0, maxY = 0, any = false;
    for (const p of (model ? model.parts : [])) {
      for (const [x, y] of partCorners(p)) {
        if (!any) { minX = maxX = x; minY = maxY = y; any = true; }
        minX = Math.min(minX, x); maxX = Math.max(maxX, x);
        minY = Math.min(minY, y); maxY = Math.max(maxY, y);
      }
    }
    if (!any) { view.zoom = 4; view.ox = cw / 2; view.oy = ch / 2; draw(); return; }
    const bw = Math.max(20, maxX - minX), bh = Math.max(20, maxY - minY);
    const z = Math.min((cw * 0.8) / bw, (ch * 0.82) / bh);
    view.zoom = Math.max(0.5, Math.min(30, z));
    view.ox = cw / 2 - ((minX + maxX) / 2) * view.zoom;
    view.oy = ch / 2 - ((minY + maxY) / 2) * view.zoom;
    $("#zoomRange").value = Math.min(12, view.zoom);
    draw();
  }

  // ---------------------------------------------------------------------------
  // Dataset / texture loading
  // ---------------------------------------------------------------------------
  function loadImg(src) {
    return new Promise((res, rej) => { const im = new Image(); im.onload = () => res(im); im.onerror = rej; im.src = src; });
  }
  function bakeCanvas(img) {
    const c = document.createElement("canvas"); c.width = img.naturalWidth; c.height = img.naturalHeight;
    const cx = c.getContext("2d", { willReadFrequently: true }); cx.drawImage(img, 0, 0);
    return { c, cx };
  }

  async function activateDataset(name, resetHistory) {
    const d = DATASETS[name]; if (!d) return;
    dsName = name; kind = d.kind;
    models = d.models; originalModels = d.original;
    frames = d.frames || {};
    tintCache.clear();
    // textures
    if (kind === "zombie") {
      if (!atlasCanvas && d.atlas) { const im = await loadImg(d.atlas); const b = bakeCanvas(im); atlasCanvas = b.c; atlasCtx = b.cx; }
      else if (!atlasCanvas) { try { const im = await loadImg("../public/assets/zombie/ZombieSheet.png"); const b = bakeCanvas(im); atlasCanvas = b.c; atlasCtx = b.cx; } catch (_) {} }
    } else {
      // enemy: bake any not-yet-baked strips
      const strips = d.strips || {};
      const need = Object.keys(strips).filter((k) => !stripCanvas[k]);
      await Promise.all(need.map(async (k) => { try { const im = await loadImg(strips[k]); const b = bakeCanvas(im); stripImg[k] = im; stripCanvas[k] = b.c; stripCtx[k] = b.cx; } catch (_) {} }));
    }
    modelKey = models[modelKey] ? modelKey : Object.keys(models)[0];
    if (resetHistory) { undoStack = []; redoStack = []; refreshUndoButtons(); }
    rebuildFrameList();
    updateAddUi();
    $("#btnLoadFrames").style.display = kind === "zombie" ? "" : "none";
    rebuildModelSelect(false);
    if (DATASETS[dsName].autosave) setStoreStatus("💾 Restored your stored edits", "#3fb950");
    else setStoreStatus("", "");
  }

  function rebuildDatasetSelect() {
    const s = $("#dsSel"); s.innerHTML = "";
    Object.keys(DATASETS).forEach((n) => { const o = document.createElement("option"); o.value = n; o.textContent = `${DATASETS[n].label || n} (${Object.keys(DATASETS[n].models).length})`; s.appendChild(o); });
    s.value = dsName;
  }
  function rebuildModelSelect(keepSel) {
    const s = $("#modelSel"); s.innerHTML = "";
    Object.keys(models).forEach((k) => { const o = document.createElement("option"); o.value = k; o.textContent = k; s.appendChild(o); });
    if (!models[modelKey]) modelKey = Object.keys(models)[0];
    s.value = modelKey;
    selectModel(modelKey, keepSel);
  }
  function rebuildFrameList() {
    const dl = $("#frameList"); dl.innerHTML = "";
    if (kind === "zombie") Object.keys(frames).sort().forEach((n) => { const o = document.createElement("option"); o.value = n; dl.appendChild(o); });
  }
  function updateAddUi() {
    $("#addLabel").textContent = kind === "zombie" ? "Add part (frame name)" : "Add part (new rect)";
    $("#addPartInput").style.display = kind === "zombie" ? "" : "none";
    $("#btnLoadImg").textContent = kind === "zombie" ? "Load atlas…" : "Load strip…";
  }

  function selectModel(k, keepSel) {
    modelKey = k; model = models[k];
    model.parts = model.parts || [];
    if (kind === "zombie" && !model.neck) model.neck = { x: 0, y: 0 };
    if (kind === "enemy" && model.neck === undefined) model.neck = null;
    model.pivots = model.pivots || [];
    if (!keepSel) { sel = model.parts.length ? 0 : -1; hidden.clear(); }
    if (sel >= model.parts.length) sel = model.parts.length - 1;
    rebuildLayers(); rebuildInspector(); rebuildPivotEditor(); rebuildFlags(); updateExport();
    if (!keepSel) fitView(); else draw();
  }

  // ---------------------------------------------------------------------------
  // Layers
  // ---------------------------------------------------------------------------
  function rebuildLayers() {
    const list = $("#layerList"); list.innerHTML = "";
    const order = model.parts.map((p, i) => i).sort((a, b) => model.parts[b].z - model.parts[a].z);
    order.forEach((i) => {
      const p = model.parts[i];
      const el = document.createElement("div");
      el.className = "layer" + (i === sel ? " sel" : "");
      const backTag = (kind === "enemy" && p.back) ? " ·back" : "";
      el.innerHTML = `<span class="vis ${hidden.has(i) ? "" : "on"}" title="visibility">👁</span>` +
        `<span class="nm">${partLabel(p)}</span>` +
        `<span class="grp">${(p.group || "root") + backTag}</span>` +
        `<span class="z">z${p.z}</span>`;
      el.addEventListener("click", (e) => {
        if (e.target.classList.contains("vis")) { hidden.has(i) ? hidden.delete(i) : hidden.add(i); rebuildLayers(); draw(); return; }
        sel = i; rebuildLayers(); rebuildInspector(); draw();
      });
      list.appendChild(el);
    });
  }

  // ---------------------------------------------------------------------------
  // Inspector
  // ---------------------------------------------------------------------------
  function numField(labelText, val, step, oninput) {
    const wrap = document.createElement("div"); wrap.className = "field";
    wrap.innerHTML = `<label>${labelText}</label>`;
    const inp = document.createElement("input"); inp.type = "number"; inp.step = step; inp.value = round(val);
    inp.addEventListener("focus", () => pushUndo("field-" + labelText));
    inp.addEventListener("input", () => oninput(parseFloat(inp.value)));
    wrap.appendChild(inp); return wrap;
  }
  function rebuildInspector() {
    const box = $("#inspector"); box.innerHTML = "";
    if (sel < 0 || !model.parts[sel]) { box.innerHTML = '<div class="hint">No part selected.</div>'; return; }
    const p = model.parts[sel];

    if (kind === "zombie") {
      const fileRow = document.createElement("div"); fileRow.className = "field";
      fileRow.innerHTML = `<label>file (frame)</label>`;
      const fi = document.createElement("input"); fi.type = "text"; fi.value = p.file; fi.setAttribute("list", "frameList");
      fi.addEventListener("focus", () => pushUndo("file")); fi.addEventListener("change", () => { p.file = fi.value.trim(); sync(); });

    box.appendChild(r2row);

    const r3 = document.createElement("div"); r3.className = "row"; r3.style.marginTop = "8px";
    const bF = mkBtn("Front", () => { pushUndo(); p.z = maxZ() + 1; sync(); rebuildLayers(); });
    const bB = mkBtn("Back", () => { pushUndo(); p.z = minZ() - 1; sync(); rebuildLayers(); });
    const bDup = mkBtn("Duplicate", () => { pushUndo(); const np = clone(p); np.z = (p.z || 0) + 1; model.parts.splice(sel + 1, 0, np); sel += 1; sync(); rebuildLayers(); rebuildInspector(); });
    const bDel = mkBtn("Delete", () => deleteSel(), "danger");

    const rc = partRect(p);

  function mkBtn(txt, fn, cls) { const b = document.createElement("button"); b.className = "mini" + (cls ? " " + cls : ""); b.textContent = txt; b.addEventListener("click", fn); return b; }

  // ---------------------------------------------------------------------------
  // Model pivots + flags
  // ---------------------------------------------------------------------------
  function pivotRow(labelText, color, getX, getY, setX, setY, onRemove) {
    const row = document.createElement("div"); row.className = "pivotrow";

    const nm = document.createElement("span"); nm.textContent = labelText; nm.style.flex = "1";
    const x = document.createElement("input"); x.type = "number"; x.step = "0.5"; x.value = round(getX());
    const y = document.createElement("input"); y.type = "number"; y.step = "0.5"; y.value = round(getY());
    x.addEventListener("focus", () => pushUndo("pivx")); y.addEventListener("focus", () => pushUndo("pivy"));
    x.addEventListener("input", () => { setX(parseFloat(x.value)); sync(); });
    y.addEventListener("input", () => { setY(parseFloat(y.value)); sync(); });
    row.append(dot, nm, x, y);

  }
  function rebuildPivotEditor() {
    const box = $("#pivotEditor"); box.innerHTML = "";

        (v) => model.neck.x = v, (v) => model.neck.y = v,

    } else {
      const add = document.createElement("div"); add.className = "pad";

      box.appendChild(add);
    }
    // shoulder (enemy)

      if (model.shoulder) {
        box.appendChild(pivotRow("shoulder", "#39c5cf", () => model.shoulder.x, () => model.shoulder.y,
          (v) => model.shoulder.x = v, (v) => model.shoulder.y = v,
          () => { pushUndo(); delete model.shoulder; sync(); rebuildPivotEditor(); }));
      } else {
        const add = document.createElement("div"); add.className = "pad";
        add.appendChild(mkBtn("+ shoulder pivot", () => { pushUndo(); model.shoulder = { x: 0, y: 0 }; sync(); rebuildPivotEditor(); }));
        box.appendChild(add);
      }
    }
    // custom named pivots
    (model.pivots || []).forEach((pv, i) => {
      const row = document.createElement("div"); row.className = "pivotrow";
      const dot = document.createElement("span"); dot.textContent = "✚"; dot.style.color = "var(--warn)";
      const nm = document.createElement("input"); nm.type = "text"; nm.value = pv.name || `pivot${i}`; nm.style.flex = "1";
      nm.addEventListener("focus", () => pushUndo()); nm.addEventListener("input", () => { pv.name = nm.value; sync(); });
      const x = document.createElement("input"); x.type = "number"; x.step = "0.5"; x.value = round(pv.x);
      const y = document.createElement("input"); y.type = "number"; y.step = "0.5"; y.value = round(pv.y);
      x.addEventListener("focus", () => pushUndo()); y.addEventListener("focus", () => pushUndo());
      x.addEventListener("input", () => { pv.x = parseFloat(x.value); sync(); });
      y.addEventListener("input", () => { pv.y = parseFloat(y.value); sync(); });
      row.append(dot, nm, x, y, mkBtn("×", () => { pushUndo(); model.pivots.splice(i, 1); sync(); rebuildPivotEditor(); }, "danger"));
      box.appendChild(row);
    });
    const add = document.createElement("div"); add.className = "pad";
    add.appendChild(mkBtn("+ named pivot", () => { pushUndo(); model.pivots.push({ name: "pivot" + model.pivots.length, x: 0, y: 0 }); sync(); rebuildPivotEditor(); }));
    box.appendChild(add);
  }
  function rebuildFlags() {
    const box = $("#flagEditor"); box.innerHTML = "";
    if (kind === "enemy") {
      box.appendChild(flagToggle("punch", !!model.punch, (v) => { model.punch = v || undefined; }));
      box.appendChild(flagToggle("slam", !!model.slam, (v) => { model.slam = v || undefined; }));
      const cs = document.createElement("label"); cs.className = "toggle";
      cs.innerHTML = `chopSign `;
      const inp = document.createElement("input"); inp.type = "number"; inp.step = "1"; inp.style.width = "52px";
      inp.value = model.chopSign == null ? "" : model.chopSign; inp.placeholder = "±1";
      inp.addEventListener("focus", () => pushUndo());
      inp.addEventListener("input", () => { const v = inp.value === "" ? null : parseFloat(inp.value); if (v == null) delete model.chopSign; else model.chopSign = v; sync(); });
      cs.appendChild(inp); box.appendChild(cs);
    } else if (model.scale != null) {
      const sc = document.createElement("label"); sc.className = "toggle"; sc.innerHTML = `scale `;
      const inp = document.createElement("input"); inp.type = "number"; inp.step = "0.05"; inp.style.width = "60px"; inp.value = model.scale;
      inp.addEventListener("focus", () => pushUndo()); inp.addEventListener("input", () => { model.scale = parseFloat(inp.value); sync(); });

  }
  function flagToggle(name, val, set) {
    const l = document.createElement("label"); l.className = "toggle";
    l.innerHTML = `<input type="checkbox" ${val ? "checked" : ""}/> ${name}`;
    l.querySelector("input").addEventListener("change", (e) => { pushUndo(); set(e.target.checked); sync(); });
    return l;
  }

  const maxZ = () => model.parts.reduce((m, p) => Math.max(m, p.z || 0), 0);
  const minZ = () => model.parts.reduce((m, p) => Math.min(m, p.z || 0), 0);
  function deleteSel() {
    if (sel < 0) return; pushUndo();
    model.parts.splice(sel, 1); hidden.clear();
    sel = Math.min(sel, model.parts.length - 1);
    sync(); rebuildLayers(); rebuildInspector();
  }

  // ---------------------------------------------------------------------------
  // Sync / export
  // ---------------------------------------------------------------------------
  function sync() { draw(); updateExport(); autosaveMaybe(); }
  function serializeModel(m) {
    if (kind === "zombie") {
      const out = { name: m.name, neck: { x: m.neck.x, y: m.neck.y }, scale: m.scale };
      if (m.color) out.color = m.color;
      if (m.pivots && m.pivots.length) out.pivots = m.pivots.map((p) => ({ name: p.name, x: r2(p.x), y: r2(p.y) }));
      out.parts = m.parts.map((p) => { const o = { file: p.file, group: p.group || "root", px: r2(p.px), py: r2(p.py), ax: r2(p.ax), ay: r2(p.ay), z: p.z, tint: !!p.tint }; if (p.rot) o.rot = r2(p.rot); return o; });
      return out;
    }
    // enemy
    const out = { parts: m.parts.map((p) => ({ rx: p.rx, ry: p.ry, rw: p.rw, rh: p.rh, px: r2(p.px), py: r2(p.py), ax: r2(p.ax), ay: r2(p.ay), z: p.z, rot: r2(p.rot || 0), group: p.group || "body", back: !!p.back })) };
    out.neck = m.neck ? { x: r2(m.neck.x), y: r2(m.neck.y) } : null;
    if (m.shoulder) out.shoulder = { x: r2(m.shoulder.x), y: r2(m.shoulder.y) };
    if (m.punch) out.punch = true;
    if (m.slam) out.slam = true;
    if (m.chopSign != null) out.chopSign = m.chopSign;
    if (m.pivots && m.pivots.length) out.pivots = m.pivots.map((p) => ({ name: p.name, x: r2(p.x), y: r2(p.y) }));
    return out;
  }
  function updateExport() { $("#export").value = JSON.stringify(serializeModel(model), null, 1); }

  // ---------------------------------------------------------------------------
  // Drawing
  // ---------------------------------------------------------------------------
  const tintCache = new Map();
  function tintedFrame(p) {
    if (kind !== "zombie" || !p.tint || !model.color) return null;
    const fr = partRect(p); if (!fr) return null;
    const key = p.file + "|" + model.color.join(",");
    let c = tintCache.get(key); if (c) return c;
    c = document.createElement("canvas"); c.width = fr.w; c.height = fr.h;
    const cx = c.getContext("2d");
    cx.drawImage(atlasCanvas, fr.x, fr.y, fr.w, fr.h, 0, 0, fr.w, fr.h);
    cx.globalCompositeOperation = "multiply"; cx.fillStyle = `rgb(${model.color[0]},${model.color[1]},${model.color[2]})`; cx.fillRect(0, 0, fr.w, fr.h);
    cx.globalCompositeOperation = "destination-in"; cx.drawImage(atlasCanvas, fr.x, fr.y, fr.w, fr.h, 0, 0, fr.w, fr.h);
    cx.globalCompositeOperation = "source-over"; tintCache.set(key, c); return c;
  }
  function drawPart(p, ghost) {
    const fr = partRect(p); const src = srcCanvas(); if (!fr || !src) return;
    const [sx, sy] = w2s(p.px, p.py);
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(p.rot || 0); ctx.scale(view.zoom, view.zoom);
    if (ghost) ctx.globalAlpha = 0.26;
    const dx = -p.ax * fr.w, dy = -p.ay * fr.h;
    const tc = tintedFrame(p);
    if (tc) ctx.drawImage(tc, 0, 0, fr.w, fr.h, dx, dy, fr.w, fr.h);
    else ctx.drawImage(src, fr.x, fr.y, fr.w, fr.h, dx, dy, fr.w, fr.h);
    ctx.restore();
  }
  function draw() {
    const [cw, ch] = cssSize();
    ctx.clearRect(0, 0, cw, ch); ctx.fillStyle = "#0e1116"; ctx.fillRect(0, 0, cw, ch);
    if ($("#ckGrid").checked) drawGrid(cw, ch);
    drawAxes();
    if (!model) return;
    if ($("#ckOnion").checked && originalModels[modelKey]) {
      const om = originalModels[modelKey];
      om.parts.slice().sort((a, b) => (a.z || 0) - (b.z || 0)).forEach((p) => drawPart(p, true));
    }
    model.parts.map((p, i) => i).filter((i) => !hidden.has(i)).sort((a, b) => model.parts[a].z - model.parts[b].z).forEach((i) => drawPart(model.parts[i], false));
    if (sel >= 0 && model.parts[sel]) drawSelection(model.parts[sel]);
    if (model.neck) drawPivot(model.neck.x, model.neck.y, "#f85149", "neck");
    if (model.shoulder) drawPivot(model.shoulder.x, model.shoulder.y, "#39c5cf", "shoulder");
    (model.pivots || []).forEach((pv) => drawPivot(pv.x, pv.y, "#d29922", pv.name || ""));
    $("#badge").textContent = model ? `${modelKey} · ${model.parts.length} parts` : "";
  }
  function drawGrid(cw, ch) {

    ctx.beginPath();

    for (let y = y0; y < ch; y += step) { ctx.moveTo(0, y + .5); ctx.lineTo(cw, y + .5); }
    ctx.stroke();
  }
  function drawAxes() {
    const [cw, ch] = cssSize(); const [ox, oy] = w2s(0, 0);
    ctx.strokeStyle = "#2f3b2f"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, oy + .5); ctx.lineTo(cw, oy + .5); ctx.moveTo(ox + .5, 0); ctx.lineTo(ox + .5, ch); ctx.stroke();
    ctx.fillStyle = "#3fb95099"; ctx.beginPath(); ctx.arc(ox, oy, 4, 0, 7); ctx.fill();
    ctx.fillStyle = "#6e7681"; ctx.font = "10px monospace"; ctx.fillText("origin (0,0)", ox + 7, oy + 13);
  }
  const ROT_DIST = 44;
  function drawSelection(p) {
    const fr = partRect(p); if (!fr) return;
    const [sx, sy] = w2s(p.px, p.py);
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(p.rot || 0);
    const dx = -p.ax * fr.w * view.zoom, dy = -p.ay * fr.h * view.zoom, w = fr.w * view.zoom, h = fr.h * view.zoom;
    ctx.strokeStyle = "#58a6ff"; ctx.lineWidth = 1.2; ctx.setLineDash([4, 3]); ctx.strokeRect(dx, dy, w, h); ctx.setLineDash([]);
    ctx.strokeStyle = "#3fb950"; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -ROT_DIST); ctx.stroke();
    ctx.fillStyle = "#3fb950"; ctx.beginPath(); ctx.arc(0, -ROT_DIST, 5, 0, 7); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(Math.PI / 4);
    ctx.fillStyle = "#d29922"; ctx.fillRect(-5, -5, 10, 10); ctx.strokeStyle = "#14171c"; ctx.strokeRect(-5, -5, 10, 10); ctx.restore();
  }
  function drawPivot(x, y, color, label) {
    const [sx, sy] = w2s(x, y);
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx - 7, sy); ctx.lineTo(sx + 7, sy); ctx.moveTo(sx, sy - 7); ctx.lineTo(sx, sy + 7); ctx.stroke();
    if (label) { ctx.fillStyle = color; ctx.font = "10px monospace"; ctx.fillText(label, sx + 8, sy - 4); }
  }

  // ---------------------------------------------------------------------------
  // Interaction
  // ---------------------------------------------------------------------------
  let drag = null;
  const dist2 = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;
  const eventPos = (e) => { const r = canvas.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; };

  function hitPart(p, wx, wy) {
    const fr = partRect(p); if (!fr) return false;
    let dx = wx - p.px, dy = wy - p.py; const rot = p.rot || 0;
    if (rot) { const c = Math.cos(-rot), s = Math.sin(-rot); const nx = dx * c - dy * s, ny = dx * s + dy * c; dx = nx; dy = ny; }
    const lx = dx + p.ax * fr.w, ly = dy + p.ay * fr.h;
    if (lx < 0 || ly < 0 || lx >= fr.w || ly >= fr.h) return false;
    if (!$("#ckHitAlpha").checked || !srcCtx()) return true;
    try { return srcCtx().getImageData(fr.x + (lx | 0), fr.y + (ly | 0), 1, 1).data[3] > 12; } catch (_) { return true; }
  }
  function pickPart(wx, wy) {
    const idx = model.parts.map((p, i) => i).filter((i) => !hidden.has(i)).sort((a, b) => model.parts[b].z - model.parts[a].z);
    for (const i of idx) if (hitPart(model.parts[i], wx, wy)) return i;
    return -1;
  }

  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture(e.pointerId);
    const [mx, my] = eventPos(e);
    if (spaceDown || e.button === 1) { drag = { mode: "pan", sx: mx, sy: my, ox: view.ox, oy: view.oy }; return; }
    if (sel >= 0 && model.parts[sel]) {
      const p = model.parts[sel]; const [ax, ay] = w2s(p.px, p.py); const rot = p.rot || 0;
      const rhx = ax + ROT_DIST * Math.sin(rot), rhy = ay - ROT_DIST * Math.cos(rot);
      if (dist2(mx, my, rhx, rhy) < 100) { pushUndo(); drag = { mode: "rotate", i: sel, cx: ax, cy: ay, start: rot, a0: Math.atan2(my - ay, mx - ax) }; return; }
      if (dist2(mx, my, ax, ay) < 90) { pushUndo(); drag = { mode: "anchor", i: sel }; return; }
    }

    if (model.shoulder) { const [nx, ny] = w2s(model.shoulder.x, model.shoulder.y); if (dist2(mx, my, nx, ny) < 90) { pushUndo(); drag = { mode: "shoulder" }; return; } }
    for (let i = 0; i < (model.pivots || []).length; i++) { const [px, py] = w2s(model.pivots[i].x, model.pivots[i].y); if (dist2(mx, my, px, py) < 90) { pushUndo(); drag = { mode: "pivot", i }; return; } }
    // parts
    const [wx, wy] = s2w(mx, my); const hit = pickPart(wx, wy);
    if (hit >= 0) {
      sel = hit; rebuildLayers(); rebuildInspector();
      const p = model.parts[hit]; pushUndo();
      drag = { mode: "move", i: hit, wx0: wx, wy0: wy, px0: p.px, py0: p.py };
      draw();
    } else { sel = -1; rebuildLayers(); rebuildInspector(); draw(); }
  });

  canvas.addEventListener("pointermove", (e) => {
    const [mx, my] = eventPos(e);
    if (!drag) { hoverCursor(mx, my); return; }
    if (drag.mode === "pan") { view.ox = drag.ox + (mx - drag.sx); view.oy = drag.oy + (my - drag.sy); draw(); return; }
    const [wx, wy] = s2w(mx, my);
    if (drag.mode === "move") {
      const p = model.parts[drag.i]; p.px = drag.px0 + (wx - drag.wx0); p.py = drag.py0 + (wy - drag.wy0);
      if (e.shiftKey) { p.px = Math.round(p.px); p.py = Math.round(p.py); }
      sync(); rebuildInspector();
    } else if (drag.mode === "anchor") {
      const p = model.parts[drag.i]; const fr = partRect(p); if (!fr) return;
      let dx = wx - p.px, dy = wy - p.py; const rot = p.rot || 0;
      if (rot) { const c = Math.cos(-rot), s = Math.sin(-rot); const nx = dx * c - dy * s, ny = dx * s + dy * c; dx = nx; dy = ny; }
      p.ax = clamp((dx + p.ax * fr.w) / fr.w, -0.5, 1.5); p.ay = clamp((dy + p.ay * fr.h) / fr.h, -0.5, 1.5);
      p.px = wx; p.py = wy; sync(); rebuildInspector();

      let rot = drag.start + (Math.atan2(my - drag.cy, mx - drag.cx) - drag.a0);
      if (e.shiftKey) rot = Math.round(rot / (Math.PI / 12)) * (Math.PI / 12);

    } else if (drag.mode === "neck") { setXY(model.neck, wx, wy, e.shiftKey); sync(); rebuildPivotEditor(); }
    else if (drag.mode === "shoulder") { setXY(model.shoulder, wx, wy, e.shiftKey); sync(); rebuildPivotEditor(); }
    else if (drag.mode === "pivot") { setXY(model.pivots[drag.i], wx, wy, e.shiftKey); sync(); rebuildPivotEditor(); }
  });
  function setXY(o, x, y, snap) { o.x = snap ? Math.round(x) : x; o.y = snap ? Math.round(y) : y; }
  canvas.addEventListener("pointerup", (e) => { drag = null; try { canvas.releasePointerCapture(e.pointerId); } catch (_) {} });

  function hoverCursor(mx, my) {
    let c = "default";
    if (spaceDown) c = "grab";
    else if (model) {
      const [wx, wy] = s2w(mx, my);
      if (sel >= 0 && model.parts[sel]) {
        const p = model.parts[sel]; const [ax, ay] = w2s(p.px, p.py); const rot = p.rot || 0;
        const rhx = ax + ROT_DIST * Math.sin(rot), rhy = ay - ROT_DIST * Math.cos(rot);
        if (dist2(mx, my, rhx, rhy) < 100) c = "crosshair"; else if (dist2(mx, my, ax, ay) < 90) c = "move"; else if (pickPart(wx, wy) >= 0) c = "pointer";
      } else if (pickPart(wx, wy) >= 0) c = "pointer";
    }
    canvas.style.cursor = c;
  }
  canvas.addEventListener("wheel", (e) => {
    e.preventDefault(); const [mx, my] = eventPos(e); const [wx, wy] = s2w(mx, my);
    view.zoom = clamp(view.zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12), 0.5, 40);
    view.ox = mx - wx * view.zoom; view.oy = my - wy * view.zoom;
    $("#zoomRange").value = Math.min(12, view.zoom); draw();
  }, { passive: false });

  // keyboard
  let spaceDown = false;
  window.addEventListener("keydown", (e) => {
    const typing = e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT";
    // undo/redo work everywhere
    if ((e.ctrlKey || e.metaKey) && (e.key === "z" || e.key === "Z")) { e.shiftKey ? redo() : undo(); e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && (e.key === "y" || e.key === "Y")) { redo(); e.preventDefault(); return; }
    if (typing) return;
    if (e.code === "Space") { spaceDown = true; canvas.style.cursor = "grab"; e.preventDefault(); return; }
    if (sel < 0 || !model.parts[sel]) return;
    const p = model.parts[sel]; const step = e.shiftKey ? 10 : 1;
    if (e.key === "ArrowLeft") { pushUndo("nudge"); p.px -= step; sync(); rebuildInspector(); e.preventDefault(); }
    else if (e.key === "ArrowRight") { pushUndo("nudge"); p.px += step; sync(); rebuildInspector(); e.preventDefault(); }
    else if (e.key === "ArrowUp") { pushUndo("nudge"); p.py -= step; sync(); rebuildInspector(); e.preventDefault(); }
    else if (e.key === "ArrowDown") { pushUndo("nudge"); p.py += step; sync(); rebuildInspector(); e.preventDefault(); }
    else if (e.key === "Delete" || e.key === "Backspace") { deleteSel(); e.preventDefault(); }
    else if (e.key === "[") { pushUndo("z"); p.z -= 1; sync(); rebuildLayers(); e.preventDefault(); }
    else if (e.key === "]") { pushUndo("z"); p.z += 1; sync(); rebuildLayers(); e.preventDefault(); }
  });
  window.addEventListener("keyup", (e) => { if (e.code === "Space") { spaceDown = false; canvas.style.cursor = "default"; } });

  // ---- utils ----
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const round = (v) => Math.round((v + Number.EPSILON) * 1000) / 1000;
  const r2 = round;
  const radToDeg = (r) => r * 180 / Math.PI;
  const degToRad = (d) => d * Math.PI / 180;

  // ---- toolbar wiring ----
  $("#dsSel").addEventListener("change", (e) => { activateDataset(e.target.value, true); });
  $("#modelSel").addEventListener("change", (e) => { tintCache.clear(); selectModel(e.target.value, false); });
  $("#btnUndo").addEventListener("click", undo);
  $("#btnRedo").addEventListener("click", redo);
  $("#btnFit").addEventListener("click", fitView);
  $("#ckGrid").addEventListener("change", draw);
  $("#ckOnion").addEventListener("change", draw);
  $("#zoomRange").addEventListener("input", (e) => {
    const [cw, ch] = cssSize(); const wcx = (cw / 2 - view.ox) / view.zoom, wcy = (ch / 2 - view.oy) / view.zoom;
    view.zoom = parseFloat(e.target.value); view.ox = cw / 2 - wcx * view.zoom; view.oy = ch / 2 - wcy * view.zoom; draw();
  });
  $("#btnStore").addEventListener("click", () => storeDataset(false));
  $("#btnDownload").addEventListener("click", downloadDataset);
  $("#btnDiscard").addEventListener("click", discardStored);
  $("#btnReset").addEventListener("click", () => { if (!originalModels[modelKey]) return; pushUndo(); models[modelKey] = clone(originalModels[modelKey]); tintCache.clear(); selectModel(modelKey, false); });
  $("#btnDupe").addEventListener("click", () => {
    const nk = prompt("New model key:", modelKey + "Copy"); if (!nk) return;
    models[nk] = clone(model); originalModels[nk] = clone(model); rebuildModelSelect(false); $("#modelSel").value = nk; selectModel(nk, false);
  });
  $("#btnAddPart").addEventListener("click", addPart);
  $("#addPartInput").addEventListener("keydown", (e) => { if (e.key === "Enter") addPart(); });
  function addPart() {
    pushUndo();
    let np;
    if (kind === "zombie") {
      const name = $("#addPartInput").value.trim(); if (!name) { undoStack.pop(); return; }
      np = { file: name, group: "root", px: 0, py: -20, ax: 0.5, ay: 0.5, z: maxZ() + 1, tint: true };
      $("#addPartInput").value = "";
    } else {
      np = { rx: 0, ry: 0, rw: 32, rh: 32, px: 40, py: 40, ax: 0.5, ay: 0.5, z: maxZ() + 1, rot: 0, group: "body", back: false };
    }
    model.parts.push(np); sel = model.parts.length - 1;
    rebuildLayers(); rebuildInspector(); sync();
  }
  $("#btnCopy").addEventListener("click", () => copyText($("#export").value, $("#btnCopy"), "Copy model"));
  $("#btnCopyAll").addEventListener("click", () => { const all = {}; Object.keys(models).forEach((k) => all[k] = serializeModel(models[k])); copyText(JSON.stringify(all, null, 1), $("#btnCopyAll"), "Copy ALL"); });
  $("#btnPaste").addEventListener("click", async () => {
    let txt = ""; try { txt = await navigator.clipboard.readText(); } catch (_) {}
    txt = prompt("Paste a single-model JSON to replace the current model:", txt || ""); if (!txt) return;
    try { const m = JSON.parse(txt); if (!m.parts) throw new Error("no parts[]"); pushUndo(); models[modelKey] = m; tintCache.clear(); selectModel(modelKey, false); }
    catch (err) { alert("Invalid model JSON: " + err.message); }
  });
  function copyText(txt, btn, restore) {
    navigator.clipboard.writeText(txt).then(() => { btn.textContent = "✓ Copied"; setTimeout(() => btn.textContent = restore, 1200); })
      .catch(() => { $("#export").removeAttribute("readonly"); $("#export").focus(); $("#export").select(); document.execCommand("copy"); $("#export").setAttribute("readonly", ""); });
  }

  // file loaders
  $("#btnLoadImg").addEventListener("click", () => $("#filePng").click());
  $("#btnLoadFrames").addEventListener("click", () => $("#fileFrames").click());
  $("#btnLoadModels").addEventListener("click", () => $("#fileModels").click());
  $("#filePng").addEventListener("change", (e) => {
    const f = e.target.files[0]; if (!f) return; const url = URL.createObjectURL(f);
    loadImg(url).then((im) => {
      const b = bakeCanvas(im);
      if (kind === "zombie") { atlasCanvas = b.c; atlasCtx = b.cx; tintCache.clear(); }
      else { stripImg[modelKey] = im; stripCanvas[modelKey] = b.c; stripCtx[modelKey] = b.cx; }
      draw();
    });
  });
  $("#fileFrames").addEventListener("change", (e) => readJson(e, (j) => { frames = j; DATASETS[dsName].frames = j; rebuildFrameList(); draw(); }));
  $("#fileModels").addEventListener("change", (e) => readJson(e, (j) => {
    const first = j[Object.keys(j)[0]];
    const isEnemy = first && first.parts && first.parts[0] && "rx" in first.parts[0];
    kind = isEnemy ? "enemy" : "zombie";
    DATASETS[dsName].kind = kind; DATASETS[dsName].models = j; DATASETS[dsName].original = clone(j);
    models = j; originalModels = clone(j); modelKey = Object.keys(j)[0];
    undoStack = []; redoStack = []; refreshUndoButtons(); updateAddUi();
    rebuildModelSelect(false);
  }));
  function readJson(e, cb) { const f = e.target.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = () => { try { cb(JSON.parse(rd.result)); } catch (err) { alert("Bad JSON: " + err.message); } }; rd.readAsText(f); }

  // group datalist
  (function () { const dl = document.createElement("datalist"); dl.id = "groupList"; ["root", "head", "body", "arm", "leg", "wing", "wheel", "footF", "footB"].forEach((g) => { const o = document.createElement("option"); o.value = g; dl.appendChild(o); }); document.body.appendChild(dl); })();

  // ---- boot ----
  async function boot() {
    const boot = window.__BOOT__ || {};
    DATASETS = {};
    const src = boot.datasets || {};
    for (const name of Object.keys(src)) {
      const d = src[name];
      const inlined = d.models || {};
      const stored = loadStored(name);
      // Stored edits win for models they cover; newly-shipped models still appear.
      const liveModels = clone(inlined);
      if (stored) for (const k of Object.keys(stored)) liveModels[k] = stored[k];
      DATASETS[name] = { kind: d.kind, label: d.label || name, models: liveModels, original: clone(inlined),
        frames: d.frames || {}, atlas: d.atlas || null, strips: d.strips || null, autosave: !!stored };
    }
    if (!Object.keys(DATASETS).length) { $("#badge").textContent = "⚠ No data — use Load models…"; resize(); return; }
    dsName = boot.default && DATASETS[boot.default] ? boot.default : Object.keys(DATASETS)[0];
    modelKey = null;
    rebuildDatasetSelect();
    await activateDataset(dsName, true);
    resize();
    refreshUndoButtons();
  }
  boot();
})();
</script>

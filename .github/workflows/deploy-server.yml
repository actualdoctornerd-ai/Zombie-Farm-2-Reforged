name: Deploy server (Cloudflare Worker)

# Deploys the API Worker. Manual-only for now (Run workflow button). To enable
# auto-deploy on every server/ change, add a repo secret CLOUDFLARE_API_TOKEN
# (Workers + D1 edit permission) and uncomment the `push:` trigger below.
# Until then, deploy the Worker locally with `npx wrangler deploy` from server/.
# The Worker's own secrets (SESSION_SECRET) are set via `wrangler secret put`.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "server/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      # Server modules import shared code from the root package, including PixiJS.
      - name: Install shared dependencies
        run: npm ci
        working-directory: .
      - run: npm ci
      - name: Verify migrations
        run: npm run migrations:check
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Integration tests
        run: npm run test:integration
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: server

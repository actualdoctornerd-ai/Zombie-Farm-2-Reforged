name: Deploy to GitHub Pages

# On every push to main, build the Vite app and publish the built dist/ to the
# gh-pages branch, which GitHub Pages serves. Uses the built-in GITHUB_TOKEN, so
# no personal access token or repo secret is needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# One deploy at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
      # Online-layer config (VITE_API_URL / VITE_GOOGLE_CLIENT_ID) comes from the
      # committed .env.production — both values are public. Nothing to inject here.
      - run: npm run build
      - name: Publish dist/ to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
